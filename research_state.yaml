# Research State Registry
# Controls which strategies are active in the pipeline.
# Statuses: active | candidate | under_eval | dead
#
# Scripts read this file to skip dead strategies automatically.
# Update after each research cycle based on OOS evidence.
#
# Last updated: 2026-03-09 (after convergence pipeline + NaN fix)

architecture_decisions:
  workflow_model: hybrid_agentic
  stage_governance: deterministic
  agent_authority: auto_experiment_only
  entrypoint_model: dual_layer
  notes: >
    Refactor target is a hybrid research workflow: keep M1-M5 gates explicit and
    deterministic while allowing an AI controller to run bounded experiments inside
    those rules. Runner-style scripts are now quarantined under scripts/legacy/ for
    provenance, while the canonical execution surface is the reusable research API
    plus one top-level orchestrator entrypoint.
    Current reusable seams include callable research tools, policy-driven reward:risk
    evaluation, and Newton feature-targeted enrichment through composable transforms
    plus a shared multi-timeframe resampler. Market Impulse is now parameterizable
    through feature specs like market_impulse:15m, so agents can sweep regime
    timeframes through the standard Newton pipeline. The orchestrator can now invoke
    stage-safe research tools directly instead of only advertising next actions.

research_agent:
  name: research-experiment-agent
  spec_path: skills/research-experiment-agent/SKILL.md
  role: >
    Experiment-running research agent responsible for taking a raw strategy idea and
    moving it through the correct bounded experiment flow without violating deterministic
    stage governance.
  persona: skeptical, evidence-first, conservative about promotion
  objective: >
    Maximize learning per experiment while preserving validation integrity. End each
    cycle with a clear disposition: promote, retune, gather_more_evidence, or kill.
  allowed_tasks:
    - Translate a raw idea into a testable strategy hypothesis.
    - Select the smallest valid next experiment for the current stage.
    - Run bounded sweeps, ablations, walk-forward evaluation, holdout checks, and comparisons.
    - Use the callable research tool surface and strategy metadata to run feature-aware experiments.
    - Query prior artifacts and results to avoid repeating known dead ends.
    - Write reasoning and recommend the next deterministic state transition.
  forbidden_tasks:
    - Change gates, promotion criteria, or holdout boundaries.
    - Silently promote a strategy outside the deterministic rules.
    - Cherry-pick favorable evidence and present it as a general result.
    - Rewrite strategy code unless explicitly asked for implementation work.

script_governance:
  canonical_runners:
    - run_research_orchestrator.py
    - query_results_db.py
  supported_specialized: []
  migrate_next: []
  archived_legacy:
    - legacy/run_elastic_grid.py
    - legacy/run_walk_forward_novel.py
    - legacy/run_targeted_retune.py
    - legacy/run_convergence_pipeline.py
    - legacy/run_holdout_validation.py
    - legacy/run_execution_mapping.py
    - legacy/run_market_impulse.py
    - legacy/run_opening_drive_classifier.py
    - legacy/run_measurement_sensitivity.py
    - legacy/run_sweep.py
    - legacy/run_stage_flip.py
    - legacy/run_jerk_pivot_backtest.py
    - legacy/run_novel_ideas.py
    - legacy/run_p1_evaluation.py
  notes: >
    The top-level scripts surface is intentionally minimal: only the orchestrator
    preview CLI and results query utility remain outside scripts/legacy/. Historical
    and comparison runners are quarantined under scripts/legacy/ and should not
    receive new productized logic unless preserving provenance is the explicit goal.

refactor_validation:
  purpose: >
    Preserve the minimum regression set that must still work after the orchestration
    refactor so a future session or agent can verify behavior without re-deriving the
    strategy shortlist.
  success_criteria:
    - Strategy instantiates from the new orchestration layer without manual script edits.
    - Strategy generates signals with required features resolved automatically.
    - Research runners request only the Newton features required by the selected strategies.
    - Strategy can complete at least the walk-forward stage through the new workflow.
    - Output artifacts remain comparable enough to previous runs to detect regressions.
  strategies:
    - strategy: "Elastic Band Reversion"
      status: active
      representative_tickers: [META, TSLA, AAPL]
      expected_directions: [short, combined, long]
      why_it_matters: >
        Primary baseline regression and strongest current research candidate. It is the
        reference strategy for verifying that the refactor does not break the main
        discovery-to-promotion path.
      minimum_smoke_test: "Instantiates, generates directional signals, completes walk-forward stage."
    - strategy: "Opening Drive Classifier"
      status: candidate
      representative_tickers: [SPY]
      expected_directions: [short]
      why_it_matters: >
        Covers time-windowed session logic, opening-drive classification, and nontrivial
        directional rule composition that should remain intact after orchestration changes.
      minimum_smoke_test: "Instantiates, respects session windows, generates signals, completes walk-forward stage."
    - strategy: "Kinematic Ladder"
      status: candidate
      representative_tickers: [TSLA]
      expected_directions: [short]
      why_it_matters: >
        Exercises the momentum and regime-style path and ensures weaker or conditional
        candidates still flow correctly through deterministic gates.
      minimum_smoke_test: "Instantiates, generates momentum signals, completes walk-forward stage."
    - strategy: "Jerk-Pivot Momentum (tight)"
      status: candidate
      representative_tickers: [NVDA]
      expected_directions: [short]
      why_it_matters: >
        Validates a different directional feature dependency built around VPOC proximity,
        jerk inflection, and directional evaluation flow.
      minimum_smoke_test: "Instantiates, generates directional signals, completes walk-forward stage."
    - strategy: "Market Impulse (Cross & Reclaim)"
      status: candidate
      representative_tickers: [QQQ, SPY]
      expected_directions: [short]
      why_it_matters: >
        Covers the reusable multi-timeframe path end to end, including parameterized
        higher-timeframe feature requests, directional intraday entries, and the live
        deployment bridge now being tested in bhiksha.
      minimum_smoke_test: "Instantiates, resolves alternate regime timeframes, generates directional signals, completes walk-forward stage."

strategies:

  "Elastic Band Reversion":
    status: active
    tickers: [AAPL, META, TSLA, QQQ, IWM, AMD, NVDA]
    directions: [short, combined, long]
    optimal_params:
      # Per-ticker from P0 grid search (z_score_threshold x z_score_window):
      # AAPL: z=2.5-3.0 / w=240-360   | TSLA: z=1.75 / w=120 (100% windows)
      # META: z=1.0-1.25 / w=240-360 (short, 100% windows)
      # QQQ:  z=2.5 / w=360           | IWM: z=2.0 / w=240
      use_directional_mass: true  # P1 ablation confirms DM is net positive overall
    notes: >
      SPY excluded — no edge under any config.
      Convergence pipeline (2026-03-09) promoted 10 parameter/direction variants to holdout.
      Standouts: META short (z=1.0, w=240, E[R]=+0.135, 100% wins); TSLA short (z=1.75, w=120, E[R]=+0.133, 100% wins).
      Holdout Validation (2026-03-09): TSLA short (z=1.25 / w=360) successfully passed extended 3-week untouched holdout with E[R] = +0.51 over 36 signals!
      Refresh run (2026-03-30): only IWM short (z=2.0 / w=240 / dm=true) survived full M1-M5 staging on the 2024-01-02 to 2026-02-28 window.
      Holdout stayed positive across all 3 cost points (mean E[R] = +0.1321 over 94 signals), but M5 execution stress remained too weak for deployment
      (base E[R] = +0.1966, mc_prob_positive_exp = 0.443, mc_exp_r_p50 = -0.0212).
      Expansion pass (2026-03-30) added two more holdout survivors: AMD short (z=3.0 / w=240 / dm=false)
      and NVDA long (z=3.0 / w=120 / dm=true). Both survived holdout, but only NVDA remained close to viable in M5;
      AMD's execution mapping was decisively too weak. PLTR long looked strong in M1/M2 but failed holdout.

  "Opening Drive Classifier":
    status: candidate
    tickers: [SPY]
    directions: [short]
    optimal_params:
      opening_window_minutes: 25
      entry_start_offset_minutes: 25
      entry_end_offset_minutes: 120
      min_drive_return_pct: 0.0015
      volume_multiplier: 1.2
    notes: >
      Short-continue variant showed early promise.
      2026-03-30 scout: sparse positive cells on QQQ short and IWM short, but only 1 OOS window
      each, so the strategy still fails the M2 stable-plateau objective.
      Not yet walk-forward OOS validated at sufficient scale.
      Included in convergence run to evaluate.

  "Kinematic Ladder":
    status: dead
    tickers: [TSLA]
    directions: [short]
    optimal_params:
      regime_window: 45
      accel_window: 20
      use_volume_filter: false
      volume_multiplier: 1.0
    evidence: >
      P1 ablation (2026-03-09): volume gate kills KL entirely — zero valid cells with volume ON.
      Plateau study (2026-03-30): TSLA short shows a real raw edge region with multiple
      nearby rw/aw variants surviving M2 and three surviving untouched holdout:
      rw=45/aw=20, rw=20/aw=12, rw=45/aw=12 (all volume filter OFF).
      However, M5 execution mapping stayed unacceptable across the full surviving plateau:
      best base exp(R)=+0.0629, mc_prob_positive_exp≈0.275, mc_exp_r_p50<0.
      Transfer to AMD/QQQ/NVDA/SPY was weak or negative.
    notes: >
      Mark dead for active research budgeting: the idea has a weak raw TSLA edge but no
      acceptable executable edge yet. Keep as provenance only unless a future session
      changes the execution model or trigger definition materially.

  "Jerk-Pivot Momentum (tight)":
    status: under_eval
    tickers: [TSLA, AMD]
    directions: [short]
    optimal_params:
      vpoc_proximity_pct: 0.002
      jerk_lookback: 10
      volume_multiplier: 1.3
      use_volume_filter: true
      reward_risk_ratio: 2.0
    evidence: >
      Earlier retune work (2026‑03‑22) favored NVDA short, but a fresh focused stage-framed
      run on 2026‑03‑30 across NVDA, AMD, TSLA, QQQ, and IWM shifted the best region materially.
      M2 promoted TSLA short (vpoc=0.002, jerk=10, vol=1.3) and AMD short on the same parameters;
      NVDA short failed M2 stability. Both promoted candidates then passed untouched holdout:
      TSLA mean holdout E[R]=+0.8397 over 64 signals, AMD mean holdout E[R]=+0.2288 over 67 signals.
      Multi-vehicle M5 was especially strong for TSLA short (single_option p50 ≈ +0.743, tight spread p50 ≈ +0.774)
      and solid for AMD short (single_option p50 ≈ +0.117, tight spread p50 ≈ +0.155).
    notes: >
      Fresh evidence now points to TSLA short as the lead Jerk-Pivot deployment candidate, with AMD short
      as a secondary survivor. Keep this strategy under active evaluation because it appears materially
      better aligned with single-leg options than Elastic Band. NVDA short should no longer be treated as
      the lead tracked expression until it re-proves itself.
    retune_results:
      TSLA_short:
        config: vpoc=0.002, jerk_lookback=10, volume_multiplier=1.3, ratio=2.0
        holdout_exp_r: 0.8397
        single_option_p50: 0.7433
        tight_spread_p50: 0.7738
      AMD_short:
        config: vpoc=0.002, jerk_lookback=10, volume_multiplier=1.3, ratio=2.0
        holdout_exp_r: 0.2288
        single_option_p50: 0.1165
        tight_spread_p50: 0.1549
      NVDA_short: m2_fail
    last_updated: 2026-03-30

  "Market Impulse (Cross & Reclaim)":
    status: candidate
    tickers: [QQQ, SPY]
    directions: [short]
    optimal_params:
      entry_buffer_minutes: 5
      entry_window_minutes: 60
      regime_timeframe: 1h
      vma_col: vma_10
    evidence: >
      Agentic multi-symbol run (2026-03-28) across SPY, QQQ, IWM, NVDA, and TSLA found
      the strongest execution-robust edge in the short-only Market Impulse family.
      QQQ short with 1h regime, 5-minute entry buffer, and 60-minute window reached
      M5 with base E[R]=+0.4328, Monte Carlo median E[R]=+0.2068, and stress survival
      probability 93.6%. SPY short with 1h regime, 3-minute buffer, and 45-minute
      window also survived M5 with positive stressed expectancy; TSLA short passed
      holdout but degraded under execution stress.
    notes: >
      Keep tracked as candidate until bhiksha live-session reconciliation confirms that
      the 1-minute bar timing, 1h regime construction, and algorithmic exit behavior
      match Mala research assumptions. Primary deployment candidates are QQQ short
      (buffer=5, window=60, regime=1h) and SPY short (buffer=3, window=45, regime=1h).
    last_updated: 2026-03-30

  "Compression Expansion Breakout":
    status: dead
    tickers: []
    directions: []
    evidence: >
      P1 grid search (2026-03-09): best result TSLA cw=15, cf=0.70, avg E[R]=+0.014, 67% windows.
      E[R] too thin and unstable. Volume filter removal worsens results.
    notes: >
      Not included in convergence pipeline runs.

  "Regime Router (Kinematic + Compression)":
    status: dead
    tickers: []
    directions: []
    notes: >
      Routes into dead sub-strategies. Not included in convergence pipeline runs.
